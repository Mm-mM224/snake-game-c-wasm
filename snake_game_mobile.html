<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - C语言 + WebAssembly</title>
    <style>
        * {
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            margin: 0;
            padding: 10px;
        }
        .game-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        canvas {
            width: 100%;
            height: auto;
            background: #000;
            border: 3px solid #00ffaa;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,255,170,0.3);
        }
        .info {
            margin: 15px 0;
            font-size: 24px;
            font-weight: bold;
            color: #00ffaa;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            max-width: 250px;
            margin: 20px auto;
        }
        .controls button {
            background: #00ffaa;
            border: none;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.1s;
            touch-action: manipulation;
        }
        .controls button:active {
            background: #ffaa00;
            transform: scale(0.95);
        }
        .restart-btn {
            background: #ffaa00;
            padding: 12px 24px;
            font-size: 18px;
            margin-top: 10px;
        }
        .status {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="canvas" width="400" height="300"></canvas>
    <div class="info">🐍 SCORE: <span id="score">0</span></div>
    <div class="controls">
        <div></div>
        <button id="up">⬆️</button>
        <div></div>
        <button id="left">⬅️</button>
        <button id="down">⬇️</button>
        <button id="right">➡️</button>
    </div>
    <button id="restart" class="restart-btn">🔄 重新开始</button>
    <div class="status">💡 点击屏幕按钮控制 | R 键重启</div>
</div>

<script src="snake.js"></script>
<script>
    var Module = {
        onRuntimeInitialized: function() {
            console.log("游戏已启动");
            _game_init();
            setInterval(function() {
                _game_update();
                render();
            }, 100);
        }
    };
    
    function render() {
        var isGameOver = _game_is_over();
        if (isGameOver) {
            document.getElementById('score').innerHTML = "💀 GAME OVER - " + _game_get_score();
            return;
        }
        
        var w = _game_get_width();
        var h = _game_get_height();
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var cellW = canvas.width / w;
        var cellH = canvas.height / h;
        
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff4444';
        var fx = _game_get_food_x();
        var fy = _game_get_food_y();
        ctx.fillRect(fx * cellW, fy * cellH, cellW - 1, cellH - 1);
        
        var len = _game_get_snake_len();
        for (var i = 0; i < len; i++) {
            var sx = _game_get_snake_x(i);
            var sy = _game_get_snake_y(i);
            if (i === 0) {
                ctx.fillStyle = '#00ff66';
            } else {
                ctx.fillStyle = '#00cc88';
            }
            ctx.fillRect(sx * cellW, sy * cellH, cellW - 1, cellH - 1);
        }
        
        document.getElementById('score').innerHTML = _game_get_score();
    }
    
    function setDir(dx, dy) {
        _game_set_direction(dx, dy);
    }
    
    document.getElementById('up').onclick = function() { setDir(0, -1); };
    document.getElementById('down').onclick = function() { setDir(0, 1); };
    document.getElementById('left').onclick = function() { setDir(-1, 0); };
    document.getElementById('right').onclick = function() { setDir(1, 0); };
    document.getElementById('restart').onclick = function() { _game_init(); };
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp') { e.preventDefault(); setDir(0, -1); }
        if (e.key === 'ArrowDown') { e.preventDefault(); setDir(0, 1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); setDir(-1, 0); }
        if (e.key === 'ArrowRight') { e.preventDefault(); setDir(1, 0); }
        if (e.key === 'r' || e.key === 'R') { _game_init(); }
    });
</script>
</body>
</html>
